name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Save my main.dart
        run: |
          mkdir -p /tmp/backup
          cp lib/main.dart /tmp/backup/main.dart

      - name: Create fresh Flutter project structure
        run: |
          mkdir /tmp/freshapp
          flutter create --org com.tarweeqa --project-name tarweeqa /tmp/freshapp
          cp -r /tmp/freshapp/android .

      - name: Restore my main.dart
        run: cp /tmp/backup/main.dart lib/main.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
